name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Service-role-key leak check (no service key in any client bundle)
        run: |
          set -e
          if grep -r --include="*.js" "service_role" apps/*/.next/static 2>/dev/null; then
            echo "FAIL: service_role token leaked into a client bundle"
            exit 1
          fi
          echo "OK: no service_role leak detected"
